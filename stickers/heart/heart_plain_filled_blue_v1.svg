<?xml version="1.0" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
        <defs>
          <!-- ハートの明るい水色グラデーション -->
          <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#bce7ff;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#86d1ff;stop-opacity:1"/>
          </linearGradient>
          <!-- 影のエフェクト -->
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="6"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <g filter="url(#shadow)">
          <!-- 外側の太い黒フチ（ステッカー風） -->
          <path d="M250,435 C170,395 35,315 35,180 C35,105 100,65 160,65 C205,65 235,95 250,125 C265,95 295,65 340,65 C400,65 465,105 465,180 C465,315 330,395 250,435 Z" fill="black"/>
          
          <!-- ハート本体 -->
          <path d="M250,415 C180,375 55,295 55,180 C55,120 110,85 160,85 C200,85 235,115 250,145 C265,115 300,85 340,85 C390,85 445,120 445,180 C445,295 320,375 250,415 Z" fill="url(#heartGrad)" stroke="#7ecbff" stroke-width="2"/>

          <!-- ハイライトエフェクト -->
          <path d="M110,150 Q130,95 190,105" fill="none" stroke="white" stroke-width="15" stroke-linecap="round" opacity="0.5"/>
          <circle cx="130" cy="125" r="10" fill="white" opacity="0.4"/>
        </g>
      </svg>