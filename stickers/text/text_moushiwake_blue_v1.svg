<?xml version="1.0" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="4" dy="6"/>
            <feComponentTransfer>
              <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#00008B;stop-opacity:1"/>
          </linearGradient>
        </defs>
        <g filter="url(#shadow)">
          <!-- 白フチレイヤー -->
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="100" font-weight="900" stroke="white" stroke-width="18" stroke-linejoin="round" textLength="340" lengthAdjust="spacingAndGlyphs">申し訳ございません!!</text>
          <!-- メイン色塗りレイヤー -->
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="100" font-weight="900" fill="url(#grad)" textLength="340" lengthAdjust="spacingAndGlyphs">申し訳ございません!!</text>
        </g>
      </svg>