<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
        <defs>
          <!-- ドロップシャドウ -->
          <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="6" dy="6"/>
            <feComponentTransfer>
              <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- 朝をイメージしたビタミンカラーのグラデーション -->
          <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFF700;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1"/>
          </linearGradient>
        </defs>
        <g filter="url(#shadow)">
          <!-- 白フチ（太め） -->
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="100" font-weight="900" stroke="white" stroke-width="20" stroke-linejoin="round" textLength="340" lengthAdjust="spacingAndGlyphs">おはよう</text>
          <!-- メインの色塗り -->
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="100" font-weight="900" fill="url(#grad)" textLength="340" lengthAdjust="spacingAndGlyphs">おはよう</text>
        </g>
      </svg>