<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="370" height="320">
        <defs>
          <!-- 影をつけて立体感を出す -->
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
            <feOffset dx="6" dy="6"/>
            <feComponentTransfer>
              <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        
        <g filter="url(#shadow)">
          <!-- 吹き出しのパスのみ -->
          <path d="M500,40 C280,40 100,90 100,160 C100,210 200,255 350,275 L320,310 C315,315 325,320 335,315 L430,278 C453,279 476,280 500,280 C720,280 900,230 900,160 C900,90 720,40 500,40 Z" fill="white" stroke="#111" stroke-width="15" stroke-linejoin="round"/>
        </g>
      </svg>