<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="370" height="320">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
            <feOffset dx="6" dy="6"/>
            <feComponentTransfer>
              <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        
        <g filter="url(#shadow)">
          <!-- より丸みを帯びた（縦にボリュームを持たせた）吹き出し -->
          <path d="M500,20 C350,20 220,70 220,150 C220,200 280,240 370,265 L340,305 C335,312 345,315 355,308 L450,275 C466,278 483,280 500,280 C650,280 780,230 780,150 C780,70 650,20 500,20 Z" fill="white" stroke="#111" stroke-width="15" stroke-linejoin="round"/>
        </g>
      </svg>